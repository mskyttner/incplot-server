<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>incplot embed example</title>
<script src="http://localhost:8080/incplot/embed.js"></script>
<style>
body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
h1 { font-size: 1.2rem; }
iframe { border: none; width: 100%; display: block; }
</style>
</head>
<body>
<h1>German economy &mdash; industry sectors over time</h1>
<iframe
  src="http://localhost:8080/incplot/plot?sql=SELECT+Year%2C+%22Industry+(except+construction)%22+AS+Industry%2C+%22Real+estate+activities%22+AS+RealEstate%2C+Other+FROM+read_csv('https%3A%2F%2Fkurzlinks.de%2Fgerman_economy'%2C+auto_detect%3Dtrue)&width=120&theme=solarized_light"
  scrolling="no">
</iframe>
</body>
</html>
